name: 'Run Tests'

on:
  push:
    branches: [ 'main', 'master' ]
  pull_request:
    branches: [ '*' ]
  release:
    types: [ 'created' ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Fetch Onkostar-API
        run: |
          curl -L --user dnpm:${{ secrets.PACKAGE_TOKEN }} \
            https://git.dnpm.dev/api/packages/Plugin-JF-Onkostar/generic/onkostar-api/2.14.0/onkostar-api-2.14.0.jar \
            --output ${{ github.workspace }}/libs/onkostar-api-2.14.0.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew test

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7

      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm run test
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - backend-tests
      - frontend-tests
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Fetch Onkostar-API
        run: |
          curl -L --user dnpm:${{ secrets.PACKAGE_TOKEN }} \
            https://git.dnpm.dev/api/packages/Plugin-JF-Onkostar/generic/onkostar-api/2.14.0/onkostar-api-2.14.0.jar \
            --output ${{ github.workspace }}/libs/onkostar-api-2.14.0.jar
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Setup Node
        uses: actions/setup-node@v7
      # Build
      - name: Build
        run: make jar
      # Only for release
      - name: Publish package
        if: ${{ github.event_name == 'release' && github.event.action == 'created' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
